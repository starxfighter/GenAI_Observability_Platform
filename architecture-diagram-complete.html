<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI Observability Platform - Enhanced Architecture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 16px;
            opacity: 0.95;
        }

        .controls {
            background: #f7fafc;
            padding: 20px;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .btn-secondary:hover {
            border-color: #cbd5e0;
            background: #f7fafc;
        }

        .zoom-indicator {
            padding: 8px 16px;
            background: white;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .svg-container {
            background: #f7fafc;
            overflow: auto;
            position: relative;
            height: calc(100vh - 250px);
            min-height: 600px;
        }

        .svg-wrapper {
            display: inline-block;
            transform-origin: top left;
            transition: transform 0.2s ease-out;
        }

        svg {
            display: block;
            max-width: none;
        }

        .instructions {
            background: #edf2f7;
            padding: 15px 30px;
            border-top: 2px solid #cbd5e0;
            text-align: center;
            font-size: 14px;
            color: #4a5568;
        }

        .instructions strong {
            color: #2d3748;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .controls {
                padding: 15px;
            }

            .btn {
                padding: 8px 16px;
                font-size: 13px;
            }
        }

        .download-section {
            background: #fff;
            padding: 20px 30px;
            border-top: 2px solid #e2e8f0;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .info-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #ebf4ff;
            color: #2c5282;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .info-badge svg {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 GenAI Observability Platform</h1>
            <p>Enhanced Architecture with AI Intelligence, Smart Notifications & Self-Service Portal</p>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="zoomIn()">
                <span>🔍</span> Zoom In
            </button>
            <button class="btn btn-primary" onclick="zoomOut()">
                <span>🔍</span> Zoom Out
            </button>
            <button class="btn btn-secondary" onclick="resetZoom()">
                <span>↺</span> Reset
            </button>
            <button class="btn btn-secondary" onclick="fitToScreen()">
                <span>⛶</span> Fit to Screen
            </button>
            <div class="zoom-indicator" id="zoomLevel">100%</div>
        </div>

        <div class="svg-container" id="svgContainer">
            <div class="svg-wrapper" id="svgWrapper">

    <script>
        let currentZoom = 1;
        const zoomStep = 0.2;
        const minZoom = 0.2;
        const maxZoom = 3;

        function updateZoom(newZoom) {
            currentZoom = Math.max(minZoom, Math.min(maxZoom, newZoom));
            const wrapper = document.getElementById('svgWrapper');
            wrapper.style.transform = `scale(${currentZoom})`;
            document.getElementById('zoomLevel').textContent = Math.round(currentZoom * 100) + '%';
        }

        function zoomIn() {
            updateZoom(currentZoom + zoomStep);
        }

        function zoomOut() {
            updateZoom(currentZoom - zoomStep);
        }

        function resetZoom() {
            updateZoom(1);
            document.getElementById('svgContainer').scrollTop = 0;
            document.getElementById('svgContainer').scrollLeft = 0;
        }

        function fitToScreen() {
            const container = document.getElementById('svgContainer');
            const svg = document.querySelector('svg');
            const containerWidth = container.clientWidth;
            const svgWidth = svg.getAttribute('width');
            const scale = containerWidth / svgWidth * 0.95;
            updateZoom(scale);
            container.scrollTop = 0;
            container.scrollLeft = 0;
        }

        // Enable panning with mouse
        let isPanning = false;
        let startX, startY, scrollLeft, scrollTop;

        const container = document.getElementById('svgContainer');

        container.addEventListener('mousedown', (e) => {
            isPanning = true;
            container.style.cursor = 'grabbing';
            startX = e.pageX - container.offsetLeft;
            startY = e.pageY - container.offsetTop;
            scrollLeft = container.scrollLeft;
            scrollTop = container.scrollTop;
        });

        container.addEventListener('mouseleave', () => {
            isPanning = false;
            container.style.cursor = 'grab';
        });

        container.addEventListener('mouseup', () => {
            isPanning = false;
            container.style.cursor = 'grab';
        });

        container.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            e.preventDefault();
            const x = e.pageX - container.offsetLeft;
            const y = e.pageY - container.offsetTop;
            const walkX = (x - startX) * 2;
            const walkY = (y - startY) * 2;
            container.scrollLeft = scrollLeft - walkX;
            container.scrollTop = scrollTop - walkY;
        });

        container.style.cursor = 'grab';

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === '+' || e.key === '=') {
                e.preventDefault();
                zoomIn();
            } else if (e.key === '-' || e.key === '_') {
                e.preventDefault();
                zoomOut();
            } else if (e.key === '0') {
                e.preventDefault();
                resetZoom();
            } else if (e.key === 'f' || e.key === 'F') {
                e.preventDefault();
                fitToScreen();
            }
        });

        // Initial fit to screen on load
        window.addEventListener('load', () => {
            setTimeout(fitToScreen, 100);
        });
    </script>
